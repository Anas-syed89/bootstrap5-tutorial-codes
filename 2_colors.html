<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>Colors</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>

    <body>
        <h1 class="text-center bg-primary text-danger">Hello world!</h1>

        <div class="bg-primary text-white">Primary Background</div>
        <div class="bg-success text-white">Success Background</div>
        <div class="bg-danger text-white">Danger Background</div>

        <!-- Text Colors -->
        <p class="text-primary">Primary Text</p>
        <p class="text-success">Success Text</p>
        <p class="text-danger">Danger Text</p>

        <!-- Border Colors -->
        <div class="border border-primary">Primary Border</div>
        <div class="border border-success">Success Border</div>
        <div class="border border-danger">Danger Border</div>

        <!-- Mixed Colors -->
        <div class="bg-dark text-center text-warning border-6 border-danger">
          Mixed Colors Example
        </div>
        
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
