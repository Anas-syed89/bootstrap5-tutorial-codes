<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
    <title>Responsive-Images-bootstrap</title>
</head>
<body>

    <!--
    img-fluid: Makes the image responsive so it fits the screen width. 
    
    rounded: Gives soft rounded corners to an image.

    rounded-circle: Makes the image perfectly round (circle shape).

    img-thumbnail: Adds a border and makes the image look like a photo thumbnail.
    
    -->
    <img class="img-fluid rounded img-thumbnail" width="200"  src="https://images.unsplash.com/photo-1614200179396-2bdb77ebf81b?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bHV4dXJ5JTIwY2FyfGVufDB8fDB8fHww">
    <br><br><br>
    <img class="img-fluid rounded-circle" src="https://images.unsplash.com/photo-1614200179396-2bdb77ebf81b?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bHV4dXJ5JTIwY2FyfGVufDB8fDB8fHww">
     

    <script src="JS/bootstrap.min.js"></script>
</body>
</html>
