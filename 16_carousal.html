<!doctype html>
<html lang="en">
    <head>
        <title>Carousal(Image-Slider)</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>

    <body>

        <div class="container mt-2">
            <div class="carousel slide" id="demo" data-bs-ride="carousel">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active" ></button>
                    <button type="button" data-bs-target="#demo" data-bs-slide-to="1" class="active" ></button>
                    <button type="button" data-bs-target="#demo" data-bs-slide-to="2" class="active" ></button>
                </div>

                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="IMAGES/img1.jpg" class="d-block w-100" >
                    </div>
                    <div class="carousel-item">
                        <img src="IMAGES/img2.jpg" class="d-block w-100" >
                    </div>
                    <div class="carousel-item">
                        <img src="IMAGES/img3.jpg" class="d-block w-100" >
                    </div>
                </div>

                <button type="button" class="carousel-control-prev" data-bs-target="#demo" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button type="button" class="carousel-control-next" data-bs-target="#demo" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>

            </div>
        </div>
        
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
